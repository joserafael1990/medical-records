# Cloud Build configuration for automatic backend deployment
# Triggered on push to main branch
#
# Secrets live in Secret Manager (see cortex-* secrets). Non-secret env vars
# stay inline below. Do NOT add raw secret values here or in the trigger
# substitutions — the Cloud Build history retains them permanently.

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/backend:${SHORT_SHA}'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/backend:latest'
      - '.'
    dir: 'backend'
    env:
      - 'DOCKER_BUILDKIT=1'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/backend:${SHORT_SHA}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/backend:latest'

  # Step 3: Run DB migrations before rolling out new code
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - >-
        gcloud run jobs update cortex-migrate
        --image=us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/backend:${SHORT_SHA}
        --region=${_REGION}
        &&
        gcloud run jobs execute cortex-migrate --region=${_REGION} --wait

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cortex-backend'
      - '--image=us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/backend:${SHORT_SHA}'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=20'
      - '--concurrency=20'
      - '--timeout=120'
      - '--add-cloudsql-instances=${PROJECT_ID}:us-central1:cortex-db-prod'
      # Non-sensitive env vars (safe to keep inline).
      # Custom delimiter `^|^` so CORS_ORIGINS can carry comma-separated URLs
      # without confusing gcloud's --set-env-vars parser. `|` chosen over `@`
      # because two values (SMTP_USERNAME, EMAIL_FROM) contain `@`.
      - '--set-env-vars=^|^APP_ENV=production|GCP_PROJECT_ID=${PROJECT_ID}|GCP_REGION=us-central1|GCP_STORAGE_BUCKET=cortex-medical-records-prod|ENABLE_ENCRYPTION=true|META_WHATSAPP_PHONE_ID=${_META_WHATSAPP_PHONE_ID}|GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}|GEMINI_MODEL=gemini-2.0-flash|GEMINI_BOT_ENABLED=true|GEMINI_MAX_APPOINTMENT_DAYS=90|GEMINI_CONVERSATION_TIMEOUT_MINUTES=30|GEMINI_MAX_CONTEXT_MESSAGES=15|GEMINI_ENABLE_CACHE=true|GEMINI_CACHE_TTL_SECONDS=300|GEMINI_RATE_LIMIT_PER_USER=1|GEMINI_RATE_LIMIT_MESSAGES_PER_MINUTE=10|GEMINI_COST_ALERT_THRESHOLD=100000|GEMINI_MAX_RETRIES=2|GEMINI_FALLBACK_ENABLED=true|WHATSAPP_CONVERSATION_WINDOW_HOURS=24|WHATSAPP_ENABLE_COST_TRACKING=true|WHATSAPP_ALERT_ON_EXPIRED_CONVERSATIONS=true|CORS_ORIGINS=https://sistema.cortexclinico.com,https://cortex-frontend-gdo2awip3a-uc.a.run.app,https://cortex-frontend-246017659362.us-central1.run.app,http://localhost:3000|LOG_LEVEL=info|SMTP_HOST=smtp.gmail.com|SMTP_PORT=587|SMTP_USERNAME=joserafaelgarciacastro@gmail.com|EMAIL_FROM=info@cortexclinico.com|FRONTEND_URL=https://sistema.cortexclinico.com'
      # Secrets pulled from Secret Manager at container start.
      # The runtime service account needs roles/secretmanager.secretAccessor
      # on each of these secrets (already granted to the compute default SA).
      - '--set-secrets=DATABASE_URL=cortex-database-url:latest,SECRET_KEY=cortex-secret-key:latest,JWT_SECRET_KEY=cortex-jwt-secret-key:latest,MEDICAL_ENCRYPTION_KEY=cortex-medical-encryption-key:latest,META_WHATSAPP_TOKEN=cortex-meta-whatsapp-token:latest,META_WHATSAPP_VERIFY_TOKEN=cortex-meta-whatsapp-verify-token:latest,META_WHATSAPP_APP_SECRET=cortex-meta-whatsapp-app-secret:latest,GOOGLE_CLIENT_SECRET=cortex-google-client-secret:latest'

# Build timeout (10 minutes)
timeout: 600s

# Substitutions (can be overridden)
# _GOOGLE_CLIENT_ID and _META_WHATSAPP_PHONE_ID are non-secret identifiers
# and remain as substitutions so they can be tweaked per environment.
# All prior _JWT_SECRET_KEY / _MEDICAL_ENCRYPTION_KEY / _META_WHATSAPP_* /
# _GOOGLE_CLIENT_SECRET / _DATABASE_URL / _SECRET_KEY / _SMTP_PASSWORD
# substitutions must be removed from the backend-deploy trigger so they
# stop leaking into the build history.
substitutions:
  _REGION: us-central1

# Images to be pushed to Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/backend:${SHORT_SHA}'
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/backend:latest'

# Options
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
