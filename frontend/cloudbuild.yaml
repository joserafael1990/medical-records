# Cloud Build configuration for automatic frontend deployment
# Triggered on push to main branch

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/frontend:${SHORT_SHA}'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/frontend:latest'
      - '.'
      - '--build-arg'
      - 'REACT_APP_API_URL=https://cortex-backend-246017659362.us-central1.run.app'
      - '--build-arg'
      - 'NODE_ENV=production'
      - '--build-arg'
      - 'REACT_APP_SENTRY_DSN=${_REACT_APP_SENTRY_DSN}'
      - '--build-arg'
      - 'REACT_APP_SENTRY_ENVIRONMENT=${_REACT_APP_SENTRY_ENVIRONMENT}'
      - '--build-arg'
      - 'REACT_APP_AMPLITUDE_API_KEY=${_REACT_APP_AMPLITUDE_API_KEY}'
    dir: 'frontend'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/frontend:${SHORT_SHA}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/frontend:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cortex-frontend'
      - '--image=us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/frontend:${SHORT_SHA}'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--set-env-vars=NODE_ENV=production,REACT_APP_API_URL=https://cortex-backend-246017659362.us-central1.run.app'

# Build timeout. Raised from 600s → 1200s after build f16ce95f on commit
# 373a459 (PR #74) timed out at 10:24 — all four steps succeeded but the
# whole pipeline was 24s over the limit. React build alone is ~4min, Docker
# push ~40s, gcloud run deploy ~5min — no slack at 600s. 1200s matches the
# order of magnitude of backend/cloudbuild.yaml (1320s).
timeout: 1200s

# Substitutions (can be overridden)
# These can be set in Cloud Build trigger configuration or via --substitutions flag
substitutions:
  _REACT_APP_SENTRY_DSN: ''  # Set in Cloud Build trigger secrets
  _REACT_APP_SENTRY_ENVIRONMENT: 'production'
  _REACT_APP_AMPLITUDE_API_KEY: ''  # Set in Cloud Build trigger secrets

# Images to be pushed to Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/frontend:${SHORT_SHA}'
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cortex-repo/frontend:latest'

# Options
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
